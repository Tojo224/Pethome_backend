services:
  - type: web
    name: homepet-api
    runtime: python
    runtimeVersion: 3.11
    buildCommand: "./build.sh"
    startCommand: "gunicorn pethome_back.wsgi --log-file -"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        fromSecret: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: homepet_db
          property: connectionString
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GCS_PROJECT_ID
        sync: false
      - key: GCS_BACKUP_PREFIX
        value: "backups"
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: PG_DUMP_PATH
        sync: false
      - key: PSQL_PATH
        sync: false

  - type: cron
    name: homepet-backup-scheduler
    runtime: python
    runtimeVersion: 3.11
    schedule: "*/30 * * * *"
    buildCommand: "./build.sh"
    startCommand: "python manage.py run_backup_scheduler"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        fromSecret: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: homepet_db
          property: connectionString
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GCS_PROJECT_ID
        sync: false
      - key: GCS_BACKUP_PREFIX
        value: "backups"
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: PG_DUMP_PATH
        sync: false
      - key: PSQL_PATH
        sync: false

databases:
  - name: homepet_db
    databaseName: homepet_db
    region: ohio
