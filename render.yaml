services:
  - type: web
    name: homepet-api
    runtime: python
    runtimeVersion: "3.11"
    buildCommand: "./build.sh"
    startCommand: "gunicorn pethome_back.wsgi --log-file - --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # DATABASE_URL — configurar manualmente en Render con la URL de Neon
      - key: DATABASE_URL
        sync: false
      - key: BITACORA_SECRET_KEY
        sync: false
      # CORS — URL del frontend desplegado
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      # OpenRouter / Chatbot
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: "openai/gpt-4o-mini"
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_SITE_NAME
        value: "PetHome Chatbot"
      # Email / Gmail
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Google Cloud Storage
      - key: GCS_BUCKET_NAME
        value: "pethome-backups-pethome"
      - key: GCS_PROJECT_ID
        value: "pethome-backups"
      - key: GCS_BACKUP_PREFIX
        value: "backups"
      - key: PG_DUMP_PATH
        value: "pg_dump"
      - key: PSQL_PATH
        value: "psql"
