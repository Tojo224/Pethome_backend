<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #f7f8fc; }
      .card { fill: #ffffff; stroke: #d9ddea; stroke-width: 1; }
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1b1f2a; }
      .h2 { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #2a2f3d; }
      .txt { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #4a5164; }
      .muted { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #7c8499; }
      .chip { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #2a2f3d; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>
  <text class="title" x="48" y="56">CU-24 · Gestionar movimientos de inventario</text>

  <rect class="card" x="40" y="84" width="720" height="392" rx="14"/>
  <text class="h2" x="64" y="118">Registrar movimiento</text>

  <text class="txt" x="64" y="156">Tipo de movimiento</text>
  <rect class="card" x="64" y="164" width="270" height="34" rx="8"/>
  <text class="muted" x="76" y="186">TRANSFERENCIA</text>

  <text class="txt" x="356" y="156">Producto</text>
  <rect class="card" x="356" y="164" width="370" height="34" rx="8"/>
  <text class="muted" x="368" y="186">Seleccionar producto...</text>

  <text class="txt" x="64" y="226">Cantidad</text>
  <rect class="card" x="64" y="234" width="270" height="34" rx="8"/>
  <text class="muted" x="76" y="256">3.00</text>

  <text class="txt" x="356" y="226">Motivo (opcional)</text>
  <rect class="card" x="356" y="234" width="370" height="34" rx="8"/>
  <text class="muted" x="368" y="256">Reposición de unidad móvil</text>

  <text class="txt" x="64" y="296">Punto origen</text>
  <rect class="card" x="64" y="304" width="320" height="34" rx="8"/>
  <text class="muted" x="76" y="326">ALMACEN_GENERAL</text>

  <text class="txt" x="406" y="296">Punto destino</text>
  <rect class="card" x="406" y="304" width="320" height="34" rx="8"/>
  <text class="muted" x="418" y="326">UNIDAD_MOVIL #1</text>

  <rect x="64" y="362" width="662" height="42" rx="10" fill="#ff7a1a"/>
  <text class="chip" x="332" y="388" fill="#fff">Guardar movimiento</text>

  <text class="muted" x="64" y="434">Reglas: cantidad &gt; 0, validar stock, origen/destino obligatorios según tipo.</text>

  <rect class="card" x="780" y="84" width="620" height="392" rx="14"/>
  <text class="h2" x="804" y="118">Stock actual (referencia rápida)</text>
  <text class="txt" x="804" y="156">Producto: Antipulgas Spot-On</text>
  <text class="txt" x="804" y="186">Origen (Almacén): 25.00</text>
  <text class="txt" x="804" y="216">Destino (Móvil #1): 3.00</text>
  <text class="txt" x="804" y="246">Resultado esperado: Origen 22.00 / Destino 6.00</text>

  <rect class="card" x="40" y="496" width="1360" height="364" rx="14"/>
  <text class="h2" x="64" y="530">Historial de movimientos</text>

  <rect class="card" x="64" y="542" width="230" height="30" rx="8"/>
  <text class="muted" x="76" y="562">Tipo</text>
  <rect class="card" x="306" y="542" width="250" height="30" rx="8"/>
  <text class="muted" x="318" y="562">Producto</text>
  <rect class="card" x="568" y="542" width="210" height="30" rx="8"/>
  <text class="muted" x="580" y="562">Punto</text>
  <rect class="card" x="790" y="542" width="170" height="30" rx="8"/>
  <text class="muted" x="802" y="562">Fecha desde</text>
  <rect class="card" x="972" y="542" width="170" height="30" rx="8"/>
  <text class="muted" x="984" y="562">Fecha hasta</text>
  <rect x="1156" y="542" width="120" height="30" rx="8" fill="#5b6cff"/>
  <text class="chip" x="1196" y="562" fill="#fff">Filtrar</text>

  <text class="muted" x="64" y="602">Fecha</text>
  <text class="muted" x="200" y="602">Tipo</text>
  <text class="muted" x="310" y="602">Producto</text>
  <text class="muted" x="560" y="602">Cantidad</text>
  <text class="muted" x="650" y="602">Usuario</text>
  <text class="muted" x="800" y="602">Origen</text>
  <text class="muted" x="970" y="602">Destino</text>
  <text class="muted" x="1160" y="602">Motivo</text>
  <line x1="60" y1="610" x2="1360" y2="610" stroke="#e6e9f2"/>

  <text class="txt" x="64" y="638">2026-05-26 01:35</text>
  <text class="txt" x="200" y="638">ENTRADA</text>
  <text class="txt" x="310" y="638">Arena sanitaria premium 4.5Kg</text>
  <text class="txt" x="560" y="638">10.00</text>
  <text class="txt" x="650" y="638">admin</text>
  <text class="txt" x="800" y="638">-</text>
  <text class="txt" x="970" y="638">ALMACEN_GENERAL</text>
  <text class="txt" x="1160" y="638">Carga inicial</text>

  <text class="txt" x="64" y="668">2026-05-26 01:40</text>
  <text class="txt" x="200" y="668">TRANSFERENCIA</text>
  <text class="txt" x="310" y="668">Antipulgas Spot-On</text>
  <text class="txt" x="560" y="668">3.00</text>
  <text class="txt" x="650" y="668">admin</text>
  <text class="txt" x="800" y="668">ALMACEN_GENERAL</text>
  <text class="txt" x="970" y="668">UNIDAD_MOVIL #1</text>
  <text class="txt" x="1160" y="668">Reposición</text>
</svg>
